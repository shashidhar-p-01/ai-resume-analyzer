<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-nav-bg:    rgba(255,255,255,0.08);
      --glass-nav-bdr:   rgba(255,255,255,0.22);
      --glass-blur:      blur(38px) saturate(180%);
      --glass-card-bg:   rgba(255,255,255,0.05);
      --glass-card-bdr:  rgba(255,255,255,0.18);
      --glass-highlight: inset 0 1px 0 rgba(255,255,255,0.30), inset 0 0 0 1px rgba(255,255,255,0.04);
      --shadow-soft:     0 8px 32px rgba(20,20,42,0.08), var(--glass-highlight);
      --text-primary:    #14142a;
      --text-secondary:  rgba(20,20,42,0.62);
      --accent:          #14142a;
      --accent-light:    rgba(20,20,42,0.07);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --nav-h: 72px;
      --dur: 0.85s;
      --ease: cubic-bezier(0.77, 0, 0.175, 1);
    }

    html, body { height: 100%; }
    body { 
      font-family: var(--font); 
      background: #cddcea; 
      overflow-x: hidden;
      position: relative;
    }

    .bg-orbs { position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden; }
    .orb { position:absolute;border-radius:50%;filter:blur(90px);opacity:.60;animation:drift 22s ease-in-out infinite alternate; }
    .orb-1{width:620px;height:620px;background:radial-gradient(circle,#a4c8e8,#7ba7cc 60%,transparent);top:-180px;left:-160px;animation-delay:0s}
    .orb-2{width:500px;height:500px;background:radial-gradient(circle,#c0b2e8,#9880d4 60%,transparent);top:30%;right:-130px;animation-delay:-8s}
    .orb-3{width:440px;height:440px;background:radial-gradient(circle,#b4ddd0,#82c2ab 60%,transparent);bottom:2%;left:14%;animation-delay:-15s}
    .orb-4{width:340px;height:340px;background:radial-gradient(circle,#f0d0bc,#d8a87c 60%,transparent);top:54%;left:55%;animation-delay:-5s}
    .orb-5{width:280px;height:280px;background:radial-gradient(circle,#fad8dc,#f2a4ae 60%,transparent);top:8%;left:42%;animation-delay:-11s}
    .orb-6{width:200px;height:200px;background:radial-gradient(circle,#d4ecc0,#a4d480 60%,transparent);top:70%;right:20%;animation-delay:-3s}
    @keyframes drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(48px,-38px) scale(1.07)} 66%{transform:translate(-28px,44px) scale(0.95)} 100%{transform:translate(34px,24px) scale(1.05)} }

    .nav-outer { position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 28px;background:rgba(205,228,234,0.15);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px); }
    nav { display:flex;align-items:center;justify-content:space-between;background:var(--glass-nav-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-nav-bdr);border-radius:60px;padding:10px 10px 10px 28px;box-shadow:var(--shadow-soft);max-width:1400px;margin:0 auto;gap:20px; }
    #nav-brand { font-size:16.5px;font-weight:600;color:var(--text-primary);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;text-decoration:none; }
    #nav-links { display:flex;align-items:center;flex:1;justify-content:center; }
    #nav-links ul { list-style:none;display:flex;gap:2px; }
    #nav-links a { 
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      padding: 6px 15px;
      border-radius: 50px;
      transition: color 0.2s;
      white-space: nowrap;
      cursor: pointer;
    }
    #nav-links a:hover, #nav-links a.active { color: var(--text-primary); }
    .nav-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-cta { 
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 50px;
      cursor: pointer;
      font-family: var(--font);
      text-decoration: none;
      box-shadow: 0 2px 16px rgba(20,20,42,.30);
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(20,20,42,.40);
    }

    /* ─── MAIN CONTAINER ───────────────────────────────────────────── */
    .dashboard { 
      position: relative;
      z-index: 1;
      padding: calc(var(--nav-h) + 32px) 48px 60px;
      max-width: 1400px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ─── SECTION TITLE ────────────────────────────────────────────── */
    .section-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -1px;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.9s var(--ease) forwards;
    }
    .section-title strong { font-weight: 700; }

    /* ─── CARD COMPONENT ───────────────────────────────────────────── */
    .card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow-soft);
      transition: background 0.3s ease, backdrop-filter 0.3s ease;
    }
    .card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }
    .card.reveal {
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      animation: cardReveal 0.8s var(--ease) forwards;
    }

    /* ─── ANIMATIONS ───────────────────────────────────────────────── */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes countUp {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes stepComplete {
      0%, 40% { opacity: 0; transform: scale(0.8); }
      50% { opacity: 1; }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ─── UPLOAD SECTION ───────────────────────────────────────────── */
    .upload-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-bottom: 48px;
    }

    .upload-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
    }
    .upload-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .upload-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: block;
      letter-spacing: -0.2px;
    }

    .drop-zone {
      border: 2px dashed rgba(20,20,42,0.15);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.02);
      margin-bottom: 16px;
    }
    .drop-zone:hover {
      border-color: rgba(20,20,42,0.30);
      background: rgba(255,255,255,0.04);
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(20,20,42,0.08);
    }

    .drop-zone-icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    .drop-zone-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .drop-zone-hint {
      font-size: 12px;
      color: rgba(20,20,42,0.45);
    }

    .btn-browse {
      background: var(--accent-light);
      border: 1px solid rgba(20,20,42,0.10);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      transition: all 0.2s ease;
      display: inline-block;
      margin-top: 8px;
    }
    .btn-browse:hover {
      background: rgba(20,20,42,0.12);
      border-color: rgba(20,20,42,0.18);
    }

    .upload-file-info {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(20,20,42,0.08);
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      display: none;
    }
    .upload-file-info.visible { display: block; }
    .upload-file-info strong { color: var(--text-primary); font-weight: 600; }

    .hidden-input { display: none; }

    .btn-analyze {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.3s ease;
      margin-top: 24px;
      box-shadow: 0 2px 16px rgba(20,20,42,.30);
      letter-spacing: -0.2px;
    }
    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(20,20,42,.40);
    }
    .btn-analyze:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ─── PROGRESS TIMELINE ────────────────────────────────────────── */
    .progress-section {
      margin-bottom: 48px;
      display: none;
    }
    .progress-section.visible { display: block; }

    .progress-timeline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
    }

    .progress-step {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      position: relative;
      transition: all 0.3s ease;
      opacity: 0;
      animation: slideInUp 0.6s var(--ease) forwards;
    }

    .progress-step.complete {
      background: rgba(76, 175, 80, 0.10);
      border-color: rgba(76, 175, 80, 0.30);
    }

    .progress-step-icon {
      font-size: 20px;
      margin-bottom: 8px;
      display: block;
    }

    .progress-step-icon.checkmark {
      color: #4caf50;
      animation: stepComplete 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) both;
    }

    .progress-step-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
      font-weight: 500;
    }

    /* ─── METRICS SECTION ──────────────────────────────────────────── */
    .metrics-section {
      margin-bottom: 48px;
      display: none;
    }
    .metrics-section.visible { display: block; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .metric-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }
    .metric-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .metric-value {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ─── RESULTS SECTION ──────────────────────────────────────────── */
    .results-section {
      margin-bottom: 48px;
      display: none;
    }
    .results-section.visible { display: block; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }

    .result-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }
    .result-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .result-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .result-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skill-tag {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(20,20,42,0.12);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 500;
      margin: 4px 4px 4px 0;
      flex-wrap: wrap;
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      list-style: none;
    }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .result-item::before {
      content: '•';
      display: block;
      color: var(--text-primary);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: -2px;
    }

    .result-numbered {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .result-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      background: rgba(20,20,42,0.10);
      border-radius: 50%;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    /* ─── INSIGHTS SECTION ────────────────────────────────────────── */
    .insights-section {
      margin-bottom: 48px;
      display: none;
    }
    .insights-section.visible { display: block; }

    .insights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    .insight-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }
    .insight-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .insight-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.2px;
    }

    .insight-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(20,20,42,0.08);
    }

    .insight-meta-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .insight-meta-label {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .insight-meta-value {
      color: var(--text-primary);
      font-weight: 600;
    }

    .insight-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-style: italic;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }

    /* ─── PERFORMANCE SECTION ──────────────────────────────────────── */
    .performance-section {
      margin-bottom: 48px;
      display: none;
    }
    .performance-section.visible { display: block; }

    .performance-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow-soft);
      max-width: 500px;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }

    .performance-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(20,20,42,0.08);
    }
    .performance-item:last-child { border-bottom: none; }

    .performance-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.2px;
    }

    .performance-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    /* ─── REPORT HISTORY SECTION ──────────────────────────────────── */
    .reports-section {
      margin-bottom: 48px;
      display: none;
    }
    .reports-section.visible { display: block; }

    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .report-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }
    .report-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .report-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .report-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
      flex: 1;
    }

    .report-score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 44px;
      background: rgba(76, 175, 80, 0.15);
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      color: #4caf50;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .report-time {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .report-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .report-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s ease;
    }

    .report-btn-view {
      background: rgba(20,20,42,0.10);
      color: var(--text-primary);
    }
    .report-btn-view:hover {
      background: rgba(20,20,42,0.15);
    }

    .report-btn-download {
      background: var(--accent);
      color: #fff;
    }
    .report-btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(20,20,42,.25);
    }

    /* ─── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .dashboard {
        padding: calc(var(--nav-h) + 24px) 24px 40px;
      }

      .upload-section {
        grid-template-columns: 1fr;
      }

      .insights-grid {
        grid-template-columns: 1fr;
      }

      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .progress-timeline {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .nav-outer { padding: 12px 16px; }
      nav { padding: 8px 8px 8px 20px; }
      #nav-links { display: none; }

      .card {
        padding: 24px;
      }
      .upload-card {
        padding: 24px;
      }
      .metric-card {
        padding: 20px;
      }
      .result-card {
        padding: 20px;
      }
      .insight-card {
        padding: 20px;
      }
    }

    @media (max-width: 480px) {
      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .progress-timeline {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .progress-step {
        padding: 12px;
      }

      .metric-value {
        font-size: 28px;
      }

      .section-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>
  <div class="orb orb-6"></div>
</div>

<!-- NAVIGATION -->
<div class="nav-outer">
  <nav>
    <a id="nav-brand" href="#home">AI Resume Analyzer</a>
    <div id="nav-links">
      <ul>
        <li><a href="#upload" class="nav-link active">Upload</a></li>
        <li><a href="#analysis" class="nav-link">Analysis</a></li>
        <li><a href="#reports" class="nav-link">Reports</a></li>
      </ul>
    </div>
    <div class="nav-actions">
      <button class="btn-cta" id="clear-all-btn" style="display:none;">Clear</button>
    </div>
  </nav>
</div>

<!-- MAIN DASHBOARD -->
<div class="dashboard">
  
  <!-- UPLOAD SECTION -->
  <div id="upload-section">
    <h2 class="section-title">Upload Your <strong>Documents</strong></h2>
    
    <div class="upload-section">
      <!-- Resume Upload -->
      <div class="upload-card">
        <label class="upload-label">📄 Resume PDF</label>
        <div class="drop-zone" id="resume-drop">
          <div class="drop-zone-icon">⬆️</div>
          <div class="drop-zone-text">Drag & drop your resume</div>
          <div class="drop-zone-hint">or</div>
          <button class="btn-browse" onclick="document.getElementById('resume-input').click()">Browse Files</button>
          <input type="file" id="resume-input" class="hidden-input" accept=".pdf" />
        </div>
        <div class="upload-file-info" id="resume-info"></div>
      </div>

      <!-- Job Description Upload -->
      <div class="upload-card">
        <label class="upload-label">📋 Job Description PDF</label>
        <div class="drop-zone" id="jd-drop">
          <div class="drop-zone-icon">⬆️</div>
          <div class="drop-zone-text">Drag & drop job description</div>
          <div class="drop-zone-hint">or</div>
          <button class="btn-browse" onclick="document.getElementById('jd-input').click()">Browse Files</button>
          <input type="file" id="jd-input" class="hidden-input" accept=".pdf" />
        </div>
        <div class="upload-file-info" id="jd-info"></div>
      </div>
    </div>

    <button class="btn-analyze" id="analyze-btn" disabled>Start Analysis</button>
  </div>

  <!-- PROGRESS TIMELINE -->
  <div id="progress-section" class="progress-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Analysis <strong>Progress</strong></h2>
    <div class="progress-timeline" id="progress-timeline"></div>
  </div>

  <!-- METRICS SECTION -->
  <div id="metrics-section" class="metrics-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Summary <strong>Metrics</strong></h2>
    <div class="metrics-grid" id="metrics-grid"></div>
  </div>

  <!-- RESULTS SECTION -->
  <div id="results-section" class="results-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Analysis <strong>Results</strong></h2>
    <div class="results-grid" id="results-grid"></div>
  </div>

  <!-- INSIGHTS SECTION -->
  <div id="insights-section" class="insights-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Document <strong>Insights</strong></h2>
    <div class="insights-grid" id="insights-grid"></div>
  </div>

  <!-- PERFORMANCE SECTION -->
  <div id="performance-section" class="performance-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Analysis <strong>Performance</strong></h2>
    <div class="performance-card" id="performance-card"></div>
  </div>

  <!-- REPORTS SECTION -->
  <div id="reports-section" class="reports-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Report <strong>History</strong></h2>
    <div class="reports-grid" id="reports-grid"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// FILE UPLOAD HANDLING
// ══════════════════════════════════════════════════════════════════

let uploadedFiles = {
  resume: null,
  jd: null
};

const fileInputs = {
  resume: document.getElementById('resume-input'),
  jd: document.getElementById('jd-input')
};

const dropZones = {
  resume: document.getElementById('resume-drop'),
  jd: document.getElementById('jd-drop')
};

const fileInfos = {
  resume: document.getElementById('resume-info'),
  jd: document.getElementById('jd-info')
};

// Handle file selection
function setupFileHandler(type) {
  const input = fileInputs[type];
  const dropZone = dropZones[type];
  const fileInfo = fileInfos[type];

  // File input change
  input.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      handleFile(type, e.target.files[0]);
    }
  });

  // Drag & drop
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) {
      handleFile(type, e.dataTransfer.files[0]);
    }
  });
}

function handleFile(type, file) {
  if (!file.type.includes('pdf')) {
    alert('Please upload a PDF file');
    return;
  }

  uploadedFiles[type] = file;
  const fileInfo = fileInfos[type];
  const fileName = file.name;
  const fileSize = (file.size / (1024 * 1024)).toFixed(2);

  fileInfo.innerHTML = `
    <strong>${fileName}</strong><br>
    Size: ${fileSize} MB
  `;
  fileInfo.classList.add('visible');

  checkAnalyzeButton();
}

function checkAnalyzeButton() {
  const btn = document.getElementById('analyze-btn');
  const hasResume = uploadedFiles.resume !== null;
  const hasJD = uploadedFiles.jd !== null;
  btn.disabled = !(hasResume && hasJD);
}

setupFileHandler('resume');
setupFileHandler('jd');

// ══════════════════════════════════════════════════════════════════
// ANALYSIS FLOW
// ══════════════════════════════════════════════════════════════════

const analyzeBtn = document.getElementById('analyze-btn');
const progressSection = document.getElementById('progress-section');
const metricsSection = document.getElementById('metrics-section');
const resultsSection = document.getElementById('results-section');
const insightsSection = document.getElementById('insights-section');
const performanceSection = document.getElementById('performance-section');
const reportsSection = document.getElementById('reports-section');

const progressSteps = [
  { name: 'Resume Uploaded', icon: '📄' },
  { name: 'JD Uploaded', icon: '📋' },
  { name: 'Resume Extracted', icon: '📝' },
  { name: 'JD Extracted', icon: '📝' },
  { name: 'Prompt Generated', icon: '✨' },
  { name: 'Running LLM', icon: '🤖' },
  { name: 'Generating Analysis', icon: '⚙️' },
  { name: 'Report Saved', icon: '💾' }
];

analyzeBtn.addEventListener('click', startAnalysis);

async function startAnalysis() {
  // Show progress section
  progressSection.classList.add('visible');
  const progressTimeline = document.getElementById('progress-timeline');
  progressTimeline.innerHTML = '';

  // Create progress steps
  progressSteps.forEach((step, index) => {
    const stepEl = document.createElement('div');
    stepEl.className = 'progress-step';
    stepEl.style.animationDelay = `${index * 0.15}s`;
    stepEl.innerHTML = `
      <span class="progress-step-icon">${step.icon}</span>
      <div class="progress-step-text">${step.name}</div>
    `;
    progressTimeline.appendChild(stepEl);
  });

  // Simulate progress steps completion
  for (let i = 0; i < progressSteps.length; i++) {
    await new Promise(resolve => setTimeout(resolve, 800));
    const steps = document.querySelectorAll('.progress-step');
    if (steps[i]) {
      steps[i].classList.add('complete');
      const icon = steps[i].querySelector('.progress-step-icon');
      icon.textContent = '✓';
      icon.classList.add('checkmark');
    }
  }

  // Show other sections after progress completes
  await new Promise(resolve => setTimeout(resolve, 500));
  metricsSection.classList.add('visible');
  renderMetrics();

  await new Promise(resolve => setTimeout(resolve, 400));
  resultsSection.classList.add('visible');
  renderResults();

  await new Promise(resolve => setTimeout(resolve, 400));
  insightsSection.classList.add('visible');
  renderInsights();

  await new Promise(resolve => setTimeout(resolve, 400));
  performanceSection.classList.add('visible');
  renderPerformance();

  // Save report and show history
  saveReport();
  reportsSection.classList.add('visible');
  renderReportHistory();

  // Show clear button
  document.getElementById('clear-all-btn').style.display = 'flex';
}

// ══════════════════════════════════════════════════════════════════
// METRICS RENDERING
// ══════════════════════════════════════════════════════════════════

function renderMetrics() {
  const metricsGrid = document.getElementById('metrics-grid');
  metricsGrid.innerHTML = '';

  const metrics = [
    { label: 'Match Score', value: '87', unit: '%' },
    { label: 'Skills Matched', value: '14', unit: '' },
    { label: 'Missing Skills', value: '5', unit: '' },
    { label: 'Runtime', value: '8.42', unit: 's' }
  ];

  metrics.forEach((metric, index) => {
    const card = document.createElement('div');
    card.className = 'metric-card';
    card.style.animationDelay = `${index * 0.15}s`;
    card.innerHTML = `
      <div class="metric-value">${metric.value}<span style="font-size:0.6em">${metric.unit}</span></div>
      <div class="metric-label">${metric.label}</div>
    `;
    metricsGrid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════════
// RESULTS RENDERING
// ══════════════════════════════════════════════════════════════════

function renderResults() {
  const resultsGrid = document.getElementById('results-grid');
  resultsGrid.innerHTML = '';

  const results = [
    {
      title: 'Match Score',
      type: 'score',
      content: '87%'
    },
    {
      title: 'Matching Skills',
      type: 'skills',
      content: ['JavaScript', 'React', 'Python', 'FastAPI', 'PostgreSQL', 'Docker', 'AWS', 'REST APIs', 'GraphQL', 'Git', 'Linux', 'Agile', 'TypeScript', 'Vue.js']
    },
    {
      title: 'Missing Skills',
      type: 'skills',
      content: ['Kubernetes', 'Terraform', 'Kafka', 'Machine Learning', 'Scala']
    },
    {
      title: 'Strengths',
      type: 'list',
      content: ['Strong full-stack development experience', 'Excellent problem-solving skills', 'Good experience with modern frontend frameworks', 'Solid understanding of cloud platforms', 'Experience with DevOps practices']
    },
    {
      title: 'Weaknesses',
      type: 'list',
      content: ['Limited experience with Kubernetes', 'No mention of CI/CD pipeline tools', 'Missing data engineering experience', 'Limited backend database optimization skills', 'No experience with containerization at scale']
    },
    {
      title: 'Recommendations',
      type: 'numbered',
      content: ['Learn Kubernetes for orchestration', 'Gain experience with CI/CD tools like Jenkins or GitLab CI', 'Explore data engineering with tools like Spark or Hadoop', 'Study advanced database optimization techniques', 'Build experience with distributed systems']
    }
  ];

  results.forEach((result, index) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = `${index * 0.15}s`;
    
    let contentHTML = '';
    
    if (result.type === 'score') {
      contentHTML = `<div style="font-size: 36px; font-weight: 700; color: var(--text-primary);">${result.content}</div>`;
    } else if (result.type === 'skills') {
      contentHTML = result.content
        .map(skill => `<span class="skill-tag">${skill}</span>`)
        .join('');
    } else if (result.type === 'list') {
      contentHTML = `<ul class="result-list">
        ${result.content.map(item => `<li class="result-item">${item}</li>`).join('')}
      </ul>`;
    } else if (result.type === 'numbered') {
      contentHTML = result.content
        .map((item, i) => `
          <div class="result-numbered">
            <div class="result-number">${i + 1}</div>
            <div>${item}</div>
          </div>
        `)
        .join('');
    }

    card.innerHTML = `
      <div class="result-title">${result.title}</div>
      <div class="result-content">${contentHTML}</div>
    `;
    resultsGrid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════════
// INSIGHTS RENDERING
// ══════════════════════════════════════════════════════════════════

function renderInsights() {
  const insightsGrid = document.getElementById('insights-grid');
  insightsGrid.innerHTML = '';

  const insights = [
    {
      title: 'Resume Summary',
      icon: '📄',
      data: {
        fileName: 'John_Doe_Resume.pdf',
        pages: 2,
        words: 1250
      },
      preview: 'Senior Full Stack Developer with 7+ years of experience in building scalable web applications. Proficient in JavaScript, Python, and modern cloud technologies...'
    },
    {
      title: 'Job Description Summary',
      icon: '📋',
      data: {
        fileName: 'Senior_Dev_JD.pdf',
        pages: 1,
        words: 680
      },
      preview: 'We are seeking a Senior Full Stack Engineer with expertise in JavaScript, Python, and AWS. The ideal candidate will have experience with microservices, containerization...'
    }
  ];

  insights.forEach((insight, index) => {
    const card = document.createElement('div');
    card.className = 'insight-card';
    card.style.animationDelay = `${index * 0.15}s`;
    card.innerHTML = `
      <div class="insight-title">${insight.icon} ${insight.title}</div>
      <div class="insight-meta">
        <div class="insight-meta-item">
          <span class="insight-meta-label">File Name:</span>
          <span class="insight-meta-value">${insight.data.fileName}</span>
        </div>
        <div class="insight-meta-item">
          <span class="insight-meta-label">Pages:</span>
          <span class="insight-meta-value">${insight.data.pages}</span>
        </div>
        <div class="insight-meta-item">
          <span class="insight-meta-label">Word Count:</span>
          <span class="insight-meta-value">${insight.data.words}</span>
        </div>
      </div>
      <div class="insight-preview">"${insight.preview}"</div>
    `;
    insightsGrid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════════
// PERFORMANCE RENDERING
// ══════════════════════════════════════════════════════════════════

function renderPerformance() {
  const performanceCard = document.getElementById('performance-card');
  const now = new Date();
  const timestamp = now.toLocaleString('en-US', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });

  performanceCard.innerHTML = `
    <div class="performance-item">
      <span class="performance-label">Model Name</span>
      <span class="performance-value">Gemma 7B</span>
    </div>
    <div class="performance-item">
      <span class="performance-label">Runtime</span>
      <span class="performance-value">8.42s</span>
    </div>
    <div class="performance-item">
      <span class="performance-label">Generated At</span>
      <span class="performance-value">${timestamp}</span>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════════
// REPORT HISTORY
// ══════════════════════════════════════════════════════════════════

function getReportHistory() {
  const saved = localStorage.getItem('resumeAnalysisReports');
  return saved ? JSON.parse(saved) : [];
}

function saveReport() {
  const reports = getReportHistory();
  const newReport = {
    id: Date.now(),
    name: `${uploadedFiles.resume.name.replace('.pdf', '')} - ${new Date().toLocaleDateString()}`,
    timestamp: new Date().toLocaleString(),
    matchScore: 87,
    fullData: {
      resume: uploadedFiles.resume.name,
      jd: uploadedFiles.jd.name,
      matchScore: 87,
      skillsMatched: 14,
      missingSkills: 5,
      runtime: 8.42,
      generatedAt: new Date().toISOString()
    }
  };
  reports.unshift(newReport);
  localStorage.setItem('resumeAnalysisReports', JSON.stringify(reports));
}

function renderReportHistory() {
  const reportsGrid = document.getElementById('reports-grid');
  const reports = getReportHistory();

  if (reports.length === 0) {
    reportsGrid.innerHTML = '<p style="color:var(--text-secondary);">No reports yet.</p>';
    return;
  }

  reportsGrid.innerHTML = '';
  reports.slice(0, 6).forEach((report, index) => {
    const card = document.createElement('div');
    card.className = 'report-card';
    card.style.animationDelay = `${index * 0.1}s`;
    card.innerHTML = `
      <div class="report-header">
        <div class="report-name">${report.name}</div>
        <div class="report-score">${report.matchScore}%</div>
      </div>
      <div class="report-time">${report.timestamp}</div>
      <div class="report-actions">
        <button class="report-btn report-btn-view" onclick="viewReport(${report.id})">View</button>
        <button class="report-btn report-btn-download" onclick="downloadReport(${report.id})">Download</button>
      </div>
    `;
    reportsGrid.appendChild(card);
  });
}

function viewReport(reportId) {
  const reports = getReportHistory();
  const report = reports.find(r => r.id === reportId);
  if (report) {
    alert(`Report: ${report.name}\n\nMatch Score: ${report.fullData.matchScore}%\nSkills Matched: ${report.fullData.skillsMatched}\nRuntime: ${report.fullData.runtime}s`);
  }
}

function downloadReport(reportId) {
  const reports = getReportHistory();
  const report = reports.find(r => r.id === reportId);
  if (report) {
    const json = JSON.stringify(report.fullData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${report.name}.json`;
    a.click();
  }
}

// Initialize reports on page load
window.addEventListener('load', () => {
  renderReportHistory();
});

// ══════════════════════════════════════════════════════════════════
// CLEAR ALL FUNCTIONALITY
// ══════════════════════════════════════════════════════════════════

document.getElementById('clear-all-btn').addEventListener('click', () => {
  uploadedFiles = { resume: null, jd: null };
  fileInputs.resume.value = '';
  fileInputs.jd.value = '';
  fileInfos.resume.innerHTML = '';
  fileInfos.resume.classList.remove('visible');
  fileInfos.jd.innerHTML = '';
  fileInfos.jd.classList.remove('visible');
  
  progressSection.classList.remove('visible');
  metricsSection.classList.remove('visible');
  resultsSection.classList.remove('visible');
  insightsSection.classList.remove('visible');
  performanceSection.classList.remove('visible');
  
  document.getElementById('clear-all-btn').style.display = 'none';
  checkAnalyzeButton();
});

// ══════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════

document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
  });
});

</script>

</body>
</html>
